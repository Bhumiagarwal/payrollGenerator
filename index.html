<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payroll Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #eef2f7; min-height: 100vh; margin: 0; }
        
        .upload-zone { border: 2px dashed #cbd5e1; border-radius: 12px; padding: 16px; text-align: center; cursor: pointer; background: #f8fafc; transition: all 0.2s ease; }
        .upload-zone:hover { border-color: #6366f1; background: #eef2ff; }
        .upload-zone.drag-over { border-color: #4f46e5; background: #e0e7ff; border-style: solid; transform: scale(1.02); }
        
        .ctrl-input { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid #e2e8f0; background: #f8fafc; font-weight: 600; font-size: 13px; outline: none; transition: border-color 0.2s; }
        .ctrl-input:focus { border-color: #6366f1; background: #fff; }
        .ctrl-label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 6px; }
        
        .preview-scroll { overflow-x: auto; background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .pdf-canvas { width: 800px; background: white; padding: 50px; margin: 0 auto; border: 1px solid #eee; }
    </style>
</head>
<body class="p-6 md:p-10">

<div class="max-w-[1400px] mx-auto">
    <!-- Header -->
    <div class="bg-slate-800 text-white rounded-2xl px-8 py-6 mb-8 flex justify-between items-center shadow-lg">
        <div>
            <h1 id="dashCoName" class="text-xl font-bold">Company Name</h1>
            <p class="text-slate-400 text-sm mt-1">Payroll Dashboard</p>
        </div>
        <button onclick="downloadTemplate()" class="bg-slate-700 hover:bg-slate-600 px-5 py-2.5 rounded-xl text-xs font-bold uppercase tracking-wider text-white transition-colors">
            📥 Download Dynamic Excel Template
        </button>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
        
        <!-- Controls Column -->
        <div class="xl:col-span-4 space-y-6">
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 space-y-4">
                <h3 class="font-bold text-slate-800 text-sm mb-2 uppercase tracking-wide">1. Company Details</h3>
                <div>
                    <label class="ctrl-label">Company Name</label>
                    <input type="text" id="coName" value="" placeholder="Enter Company Name" oninput="updateUI()" class="ctrl-input">
                </div>
                <div>
                    <label class="ctrl-label">Address Line</label>
                    <input type="text" id="coAddr" value="" placeholder="Enter Complete Address" oninput="updateUI()" class="ctrl-input">
                </div>
                <div>
                    <label class="ctrl-label">Company Logo</label>
                    <div id="logoZone" class="upload-zone" onclick="document.getElementById('logoInput').click()">
                        <input type="file" id="logoInput" accept="image/*" onchange="loadLogo(event)" style="display:none">
                        <img id="logoThumb" src="" style="max-height:40px; margin:auto; display:none;">
                        <p id="logoText" class="text-xs font-semibold text-slate-400 mt-2">Drop your Logo here or click</p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 space-y-4">
                <h3 class="font-bold text-slate-800 text-sm mb-2 uppercase tracking-wide">2. Pay Period</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="ctrl-label">Month</label>
                        <select id="selM" onchange="updateUI()" class="ctrl-input">
                            <option>January</option><option>February</option><option>March</option>
                            <option selected>April</option><option>May</option><option>June</option>
                            <option>July</option><option>August</option><option>September</option>
                            <option>October</option><option>November</option><option>December</option>
                        </select>
                    </div>
                    <div>
                        <label class="ctrl-label">Year</label>
                        <select id="selY" onchange="updateUI()" class="ctrl-input"></select>
                    </div>
                </div>
                <div>
                    <label class="ctrl-label">Pay Date (Optional)</label>
                    <input type="date" id="pDate" onchange="updateUI()" class="ctrl-input">
                </div>
            </div>

            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 space-y-4">
                <h3 class="font-bold text-slate-800 text-sm mb-2 uppercase tracking-wide">3. Staff Data</h3>
                <div id="xlZone" class="upload-zone border-indigo-200 bg-indigo-50" onclick="document.getElementById('exUp').click()">
                    <input type="file" id="exUp" accept=".xlsx,.xls" onchange="loadData(event)" style="display:none">
                    <p id="xlLabel" class="text-sm font-bold text-indigo-600">📄 Drop your Staff Excel here or click</p>
                    <p id="empCount" class="text-xs text-indigo-400 mt-1">Supports unlimited dynamic columns</p>
                </div>
            </div>

            <button onclick="processAll()" id="mainBtn" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-lg shadow-emerald-200 hover:bg-emerald-700 active:scale-95 transition-all">
                ⚡ Generate Native PDF Zip
            </button>

            <!-- Progress -->
            <div id="progressBox" class="hidden bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden mb-2">
                    <div id="pBar" class="bg-emerald-500 h-full w-0 transition-all duration-200"></div>
                </div>
                <p id="pText" class="text-[10px] font-bold text-slate-500 uppercase text-center tracking-wider"></p>
            </div>
        </div>

        <!-- Preview Column -->
        <div class="xl:col-span-8">
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <span class="ctrl-label m-0">Live A4 Preview (Visual Only)</span>
                    <div id="previewNav" class="hidden flex gap-3 items-center">
                        <button onclick="prevEmp()" class="text-xs bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-lg font-bold text-slate-600">← Previous</button>
                        <span id="previewIdx" class="text-xs font-bold text-slate-400"></span>
                        <button onclick="nextEmp()" class="text-xs bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-lg font-bold text-slate-600">Next →</button>
                    </div>
                </div>
                
                <div class="preview-scroll">
                    <div id="previewArea" class="flex items-center justify-center min-h-[500px]">
                        <p class="text-slate-300 font-medium italic">Upload staff list to view preview</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Endless Year
const ys = document.getElementById('selY');
const cy = new Date().getFullYear();
for(let i = 2024; i <= cy + 100; i++){ 
    const o = document.createElement('option'); o.value = i; o.text = i; 
    if(i === cy) o.selected = true; ys.appendChild(o); 
}

let rows = [], logoBase64 = '', currentPreviewIdx = 0;

function toTitleCase(str) {
    if (!str) return '';
    return str.toLowerCase().split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
}

// Drag & Drop Setup
const setupDragAndDrop = (zoneId, handleFileCallback) => {
    const zone = document.getElementById(zoneId);
    zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', (e) => { e.preventDefault(); zone.classList.remove('drag-over'); });
    zone.addEventListener('drop', (e) => {
        e.preventDefault(); zone.classList.remove('drag-over');
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) handleFileCallback(e.dataTransfer.files[0]);
    });
};

function handleLogoFile(file) {
    if(!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = evt => {
        logoBase64 = evt.target.result;
        document.getElementById('logoThumb').src = logoBase64; 
        document.getElementById('logoThumb').style.display = 'block';
        document.getElementById('logoText').textContent = 'Logo Uploaded ✓';
        updateUI();
    };
    reader.readAsDataURL(file);
}

// ---> DYNAMIC EXCEL PARSER <---
function handleExcelFile(file) {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
        const wb = XLSX.read(new Uint8Array(evt.target.result), {type:'array'});
        // Read as Array of Arrays to process the 2-row header layout
        const rawData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
        
        if (rawData.length < 2) return alert("Invalid template. Please download and use the provided template format.");

        let currentCategory = 'INFO';
        const colMap = [];
        
        // Step 1: Map the columns dynamically based on the top header row
        for (let i = 0; i < rawData[1].length; i++) {
            let topHeader = rawData[0][i] ? String(rawData[0][i]).toUpperCase().trim() : '';
            if (topHeader.includes('EARN')) currentCategory = 'EARNINGS';
            else if (topHeader.includes('DEDUCT')) currentCategory = 'DEDUCTIONS';
            else if (topHeader) currentCategory = 'INFO';
            
            // Push column mapping logic
            colMap.push({ index: i, type: currentCategory, name: rawData[1][i] });
        }

        // Step 2: Extract each employee row dynamically
        rows = [];
        for (let r = 2; r < rawData.length; r++) {
            const rowData = rawData[r];
            if (!rowData || !rowData.length) continue; 
            
            const emp = { info: {}, earns: [], deds: [] };
            colMap.forEach(col => {
                const val = rowData[col.index];
                if (val === undefined || val === null || val === '') return;
                
                if (col.type === 'EARNINGS') {
                    if (Number(val) > 0) emp.earns.push({ l: col.name, v: Math.round(Number(val)) });
                } else if (col.type === 'DEDUCTIONS') {
                    if (Number(val) > 0) emp.deds.push({ l: col.name, v: Math.round(Number(val)) });
                } else {
                    emp.info[col.name] = val;
                }
            });
            
            // Only add row if Employee Name exists
            if (emp.info['Name']) rows.push(emp);
        }

        document.getElementById('xlLabel').textContent = "✓ " + file.name;
        document.getElementById('empCount').textContent = `${rows.length} employees found`;
        document.getElementById('previewNav').classList.remove('hidden');
        currentPreviewIdx = 0;
        updateUI();
    };
    reader.readAsArrayBuffer(file);
}

function loadLogo(e) { handleLogoFile(e.target.files[0]); }
function loadData(e) { handleExcelFile(e.target.files[0]); }

setupDragAndDrop('logoZone', handleLogoFile);
setupDragAndDrop('xlZone', handleExcelFile);

function prevEmp() { if(currentPreviewIdx > 0) { currentPreviewIdx--; updateUI(); } }
function nextEmp() { if(currentPreviewIdx < rows.length - 1) { currentPreviewIdx++; updateUI(); } }

function formatINR(num) {
    return Math.round(Number(num)).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function numToWords(n) {
    const a = ['','One ','Two ','Three ','Four ','Five ','Six ','Seven ','Eight ','Nine ','Ten ','Eleven ','Twelve ','Thirteen ','Fourteen ','Fifteen ','Sixteen ','Seventeen ','Eighteen ','Nineteen '];
    const b = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
    let num = ('000000000'+Math.floor(n)).substr(-9).match(/^(\d{2})(\d{2})(\d{2})(\d{1})(\d{2})$/);
    if (!num) return ''; 
    let s = '';
    s += (num[1]!=0)?(a[Number(num[1])]||b[num[1][0]]+' '+a[num[1][1]])+'Crore ':'';
    s += (num[2]!=0)?(a[Number(num[2])]||b[num[2][0]]+' '+a[num[2][1]])+'Lakh ':'';
    s += (num[3]!=0)?(a[Number(num[3])]||b[num[3][0]]+' '+a[num[3][1]])+'Thousand ':'';
    s += (num[4]!=0)?(a[Number(num[4])]||b[num[4][0]]+' '+a[num[4][1]])+'Hundred ':'';
    s += (num[5]!=0)?((s!='')?'and ':'')+( a[Number(num[5])]||b[num[5][0]]+' '+a[num[5][1]]):'';
    return s.trim() + ' Only';
}

function updateUI() {
    document.getElementById('dashCoName').textContent = document.getElementById('coName').value || 'Company Name';
    if (!rows.length) return;
    document.getElementById('previewIdx').textContent = `${currentPreviewIdx + 1} of ${rows.length}`;
    document.getElementById('previewArea').innerHTML = buildHTMLPreview(rows[currentPreviewIdx]);
}

function buildHTMLPreview(r) {
    const coName = document.getElementById('coName').value || 'Your Company Name';
    const coAddr = document.getElementById('coAddr').value || 'Your Company Address';
    const m = document.getElementById('selM').value, y = document.getElementById('selY').value;
    const pDateRaw = document.getElementById('pDate').value;
    const pd = pDateRaw ? pDateRaw.split('-').reverse().join('/') : '—';

    // Data dynamically pulled from parsed objects
    const earns = r.earns || [];
    const deds = r.deds || [];
    const gE = earns.reduce((a,b)=>a+b.v,0), tD = deds.reduce((a,b)=>a+b.v,0), net = gE - tD;

    let trs = '';
    const max = Math.max(earns.length, deds.length);
    for(let i=0; i<max; i++) {
        const e = earns[i] || {l:'',v:''}, d = deds[i] || {l:'',v:''};
        trs += `<tr>
            <td style="padding:14px 10px; border-bottom:1px dashed #e2e8f0; color:#475569; width:35%;">${e.l}</td>
            <td style="padding:14px 10px; border-bottom:1px dashed #e2e8f0; text-align:right; font-weight:700; color:#0f172a; width:15%;">${e.v ? '₹'+formatINR(e.v) : ''}</td>
            <td style="padding:14px 10px 14px 20px; border-bottom:1px dashed #e2e8f0; border-left:1px solid #e2e8f0; color:#475569; width:35%;">${d.l}</td>
            <td style="padding:14px 10px; border-bottom:1px dashed #e2e8f0; text-align:right; font-weight:700; color:#ef4444; width:15%;">${d.v ? '₹'+formatINR(d.v) : ''}</td>
        </tr>`;
    }

    return `<div class="pdf-canvas" style="font-family:'Plus Jakarta Sans',sans-serif; color:#0f172a; background:#fff;">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:40px;">
            <div style="display:flex; align-items:center; gap:20px;">
                ${logoBase64 ? `<img src="${logoBase64}" style="max-height:55px; max-width:200px; object-fit:contain;">` : `<div style="font-size:24px; font-weight:800; color:#94a3b8;">[LOGO]</div>`}
                <div><h1 style="font-size:22px; font-weight:800; color:#1e293b; margin:0 0 6px 0;">${coName}</h1><p style="font-size:12px; color:#64748b; margin:0;">${coAddr}</p></div>
            </div>
            <div style="text-align:right; padding-top:4px;">
                <p style="font-size:10px; font-weight:800; color:#94a3b8; text-transform:uppercase; letter-spacing:1px; margin:0 0 4px 0;">PAYSLIP</p>
                <p style="font-size:14px; font-weight:800; color:#1e293b; margin:0;">${m} ${y}</p>
            </div>
        </div>
        <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
            <div style="flex:1;">
                <p style="font-size:10px; font-weight:800; color:#94a3b8; text-transform:uppercase; margin:0 0 16px 0;">EMPLOYEE SUMMARY</p>
                <table style="font-size:12px; color:#64748b; line-height:2;">
                    <tr><td style="width:120px;">Employee Name</td><td>: <strong style="color:#0f172a;">${toTitleCase(r.info['Name'] || '—')}</strong></td></tr>
                    <tr><td>Employee ID</td><td>: <strong style="color:#0f172a;">${r.info['ID'] || '—'}</strong></td></tr>
                    ${r.info['Designation'] ? `<tr><td>Designation</td><td>: <strong style="color:#0f172a;">${toTitleCase(r.info['Designation'])}</strong></td></tr>` : ''}
                    <tr><td>Pay Period</td><td>: <strong style="color:#0f172a;">${m} ${y}</strong></td></tr>
                    <tr><td>Pay Date</td><td>: <strong style="color:#0f172a;">${pd}</strong></td></tr>
                </table>
            </div>
            <div style="width:280px; background:#f0fdf4; border:1px solid #dcfce7; border-radius:10px; padding:20px; display:flex; flex-direction:column; justify-content:center;">
                 <p style="font-size:10px; font-weight:800; color:#16a34a; margin:0 0 8px 0; text-transform:uppercase;">TOTAL NET PAY</p>
                 <div style="display:flex; align-items:center; justify-content:space-between;">
                     <div><p style="font-size:11px; color:#64748b; margin:0 0 4px 0;">Paid Days: <strong style="color:#0f172a;">${r.info['PaidDays'] || 0}</strong></p><p style="font-size:11px; color:#64748b; margin:0;">LOP Days: <strong style="color:#0f172a;">${r.info['LOPDays'] || 0}</strong></p></div>
                     <p style="font-size:24px; font-weight:800; color:#0f172a; margin:0; letter-spacing:-0.5px;">₹${formatINR(net)}</p>
                 </div>
            </div>
        </div>
        <table style="width:100%; border-collapse:collapse; font-size:12px; margin-bottom:20px;">
            <thead>
                <tr>
                    <th style="text-align:left; padding:12px 10px; color:#64748b; font-size:10px; font-weight:800; text-transform:uppercase; border-bottom:1px dashed #cbd5e1; border-top:1px solid #f1f5f9;">EARNINGS</th>
                    <th style="text-align:right; padding:12px 10px; color:#64748b; font-size:10px; font-weight:800; text-transform:uppercase; border-bottom:1px dashed #cbd5e1; border-top:1px solid #f1f5f9;">AMOUNT</th>
                    <th style="text-align:left; padding:12px 10px 12px 20px; color:#64748b; font-size:10px; font-weight:800; text-transform:uppercase; border-bottom:1px dashed #cbd5e1; border-top:1px solid #f1f5f9; border-left:1px solid #e2e8f0;">DEDUCTIONS</th>
                    <th style="text-align:right; padding:12px 10px; color:#64748b; font-size:10px; font-weight:800; text-transform:uppercase; border-bottom:1px dashed #cbd5e1; border-top:1px solid #f1f5f9;">AMOUNT</th>
                </tr>
            </thead>
            <tbody>${trs}</tbody>
            <tfoot>
                <tr style="background:#f8fafc;">
                    <td style="padding:16px 10px; font-weight:800; color:#0f172a;">Gross Earnings</td>
                    <td style="padding:16px 10px; text-align:right; font-weight:800; color:#0f172a;">₹${formatINR(gE)}</td>
                    <td style="padding:16px 10px 16px 20px; border-left:1px solid #e2e8f0; font-weight:800; color:#0f172a;">Total Deductions</td>
                    <td style="padding:16px 10px; text-align:right; font-weight:800; color:#ef4444;">₹${formatINR(tD)}</td>
                </tr>
            </tfoot>
        </table>
        <div style="background:#f0fdf4; border:1px solid #dcfce7; border-radius:10px; padding:24px; display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <div><p style="font-size:12px; font-weight:800; color:#16a34a; margin:0 0 4px 0; text-transform:uppercase;">TOTAL NET PAYABLE</p><p style="font-size:10px; color:#94a3b8; margin:0;">Gross Earnings - Total Deductions</p></div>
            <p style="font-size:28px; font-weight:800; color:#0f172a; margin:0; letter-spacing:-0.5px;">₹${formatINR(net)}</p>
        </div>
        <p style="text-align:right; font-size:10px; color:#64748b; font-weight:500; margin:0;">Amount In Words : <strong style="color:#0f172a;">Indian Rupee ${numToWords(net)}</strong></p>
    </div>`;
}

async function processAll() {
    if (!rows.length) return alert('Please upload a staff Excel file first.');
    const zip = new JSZip();
    const pb = document.getElementById('progressBox');
    const btn = document.getElementById('mainBtn');
    
    const coName = document.getElementById('coName').value || 'Your Company Name';
    const coAddr = document.getElementById('coAddr').value || 'Your Company Address';
    const m = document.getElementById('selM').value;
    const y = document.getElementById('selY').value;
    const pDateRaw = document.getElementById('pDate').value;
    const pd = pDateRaw ? pDateRaw.split('-').reverse().join('/') : '—';

    pb.classList.remove('hidden'); 
    btn.disabled = true;
    
    const { jsPDF } = window.jspdf;

    for (let i = 0; i < rows.length; i++) {
        const r = rows[i];
        
        const employeeNameTitleCase = toTitleCase((r.info['Name'] || 'Employee').trim());
        const employeeDesignationTitleCase = r.info['Designation'] ? toTitleCase(String(r.info['Designation']).trim()) : '';

        document.getElementById('pText').innerText = `Generating PDF: ${employeeNameTitleCase}`;
        document.getElementById('pBar').style.width = `${((i+1)/rows.length)*100}%`;

        const doc = new jsPDF({ format: 'a4', unit: 'pt' });
        let startY = 40;

        if (logoBase64) {
            try {
                const imgProps = doc.getImageProperties(logoBase64);
                const maxW = 140, maxH = 45;
                const ratio = Math.min(maxW / imgProps.width, maxH / imgProps.height);
                doc.addImage(logoBase64, imgProps.fileType, 40, startY, imgProps.width * ratio, imgProps.height * ratio);
            } catch(e) {}
            doc.setFontSize(18); doc.setFont('helvetica', 'bold'); doc.setTextColor(30, 41, 59);
            doc.text(coName, 200, startY + 18);
            doc.setFontSize(9); doc.setFont('helvetica', 'normal'); doc.setTextColor(100, 116, 139);
            doc.text(coAddr, 200, startY + 32);
        } else {
            doc.setFontSize(18); doc.setFont('helvetica', 'bold'); doc.setTextColor(30, 41, 59);
            doc.text(coName, 40, startY + 18);
            doc.setFontSize(9); doc.setFont('helvetica', 'normal'); doc.setTextColor(100, 116, 139);
            doc.text(coAddr, 40, startY + 32);
        }

        doc.setFontSize(8); doc.setFont('helvetica', 'bold'); doc.setTextColor(148, 163, 184);
        doc.text("PAYSLIP", 555, startY + 12, { align: 'right' });
        doc.setFontSize(12); doc.setTextColor(30, 41, 59);
        doc.text(`${m} ${y}`, 555, startY + 28, { align: 'right' });

        startY += 70;

        doc.setFontSize(8); doc.setFont('helvetica', 'bold'); doc.setTextColor(148, 163, 184);
        doc.text("EMPLOYEE SUMMARY", 40, startY);
        
        let empY = startY + 15;
        doc.setFontSize(10); doc.setFont('helvetica', 'normal');
        const drawEmpLine = (lbl, val) => {
            doc.setTextColor(100, 116, 139); doc.text(lbl, 40, empY);
            doc.setTextColor(30, 41, 59); doc.setFont('helvetica', 'bold'); doc.text(`:  ${val}`, 130, empY);
            doc.setFont('helvetica', 'normal'); empY += 15;
        };
        
        drawEmpLine("Employee Name", employeeNameTitleCase);
        drawEmpLine("Employee ID", r.info['ID'] || '—');
        if(employeeDesignationTitleCase) drawEmpLine("Designation", employeeDesignationTitleCase);
        drawEmpLine("Pay Period", `${m} ${y}`);
        drawEmpLine("Pay Date", pd);

        const earns = r.earns || [];
        const deds = r.deds || [];
        const gE = earns.reduce((a,b)=>a+b.v,0), tD = deds.reduce((a,b)=>a+b.v,0), net = gE - tD;

        doc.setDrawColor(220, 252, 231); doc.setFillColor(240, 253, 244);
        doc.roundedRect(320, startY - 10, 235, 75, 6, 6, 'FD');
        doc.setFontSize(8); doc.setFont('helvetica', 'bold'); doc.setTextColor(22, 163, 74);
        doc.text("TOTAL NET PAY", 335, startY + 5);
        doc.setFontSize(9); doc.setFont('helvetica', 'normal'); doc.setTextColor(100, 116, 139);
        doc.text(`Paid Days:`, 335, startY + 25); doc.setFont('helvetica','bold'); doc.setTextColor(30,41,59); doc.text(`${r.info['PaidDays']||0}`, 380, startY + 25);
        doc.setFont('helvetica', 'normal'); doc.setTextColor(100, 116, 139);
        doc.text(`LOP Days:`, 335, startY + 40); doc.setFont('helvetica','bold'); doc.setTextColor(30,41,59); doc.text(`${r.info['LOPDays']||0}`, 380, startY + 40);
        doc.setFontSize(18); doc.text(`Rs. ${formatINR(net)}`, 540, startY + 35, { align: 'right' });

        startY = empY + 20;

        let tData = [];
        const mx = Math.max(earns.length, deds.length);
        for(let j=0; j<mx; j++) {
            tData.push([
                earns[j] ? earns[j].l : '', earns[j] ? `Rs. ${formatINR(earns[j].v)}` : '',
                deds[j] ? deds[j].l : '', deds[j] ? `Rs. ${formatINR(deds[j].v)}` : ''
            ]);
        }

        doc.autoTable({
            startY: startY,
            head: [['EARNINGS', 'AMOUNT', 'DEDUCTIONS', 'AMOUNT']],
            body: tData,
            theme: 'grid',
            headStyles: { fillColor: [248, 250, 252], textColor: [100, 116, 139], fontSize: 8, fontStyle: 'bold' },
            columnStyles: { 0: { cellWidth: 165 }, 1: { cellWidth: 90, halign: 'right', fontStyle: 'bold', textColor: [15, 23, 42] }, 2: { cellWidth: 165 }, 3: { cellWidth: 95, halign: 'right', fontStyle: 'bold', textColor: [239, 68, 68] } },
            styles: { fontSize: 9, cellPadding: 10, lineColor: [226, 232, 240], textColor: [71, 85, 105] },
            foot: [['Gross Earnings', `Rs. ${formatINR(gE)}`, 'Total Deductions', `Rs. ${formatINR(tD)}`]],
            footStyles: { fillColor: [248, 250, 252], textColor: [15, 23, 42], fontStyle: 'bold' }
        });

        let finalY = doc.lastAutoTable.finalY + 30;
        doc.setDrawColor(220, 252, 231); doc.setFillColor(240, 253, 244);
        doc.roundedRect(40, finalY, 515, 60, 6, 6, 'FD');
        doc.setFontSize(10); doc.setFont('helvetica', 'bold'); doc.setTextColor(22, 163, 74);
        doc.text("TOTAL NET PAYABLE", 55, finalY + 25);
        doc.setFontSize(8); doc.setFont('helvetica', 'normal'); doc.setTextColor(100, 116, 139);
        doc.text("Gross Earnings - Total Deductions", 55, finalY + 40);
        doc.setFontSize(22); doc.setFont('helvetica', 'bold'); doc.setTextColor(30, 41, 59);
        doc.text(`Rs. ${formatINR(net)}`, 540, finalY + 35, { align: 'right' });
        
        doc.setFontSize(8); doc.setFont('helvetica', 'normal'); doc.setTextColor(100, 116, 139);
        doc.text(`Amount In Words: Indian Rupee ${numToWords(net)}`, 555, finalY + 80, { align: 'right' });

        const pdfBlob = doc.output('blob');
        zip.file(`${employeeNameTitleCase} Pay Slip ${m} ${y}.pdf`, pdfBlob);
        
        if (i % 5 === 0) await new Promise(res => setTimeout(res, 20)); 
    }

    const content = await zip.generateAsync({type: "blob"});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(content);
    
    const zipPrefix = (document.getElementById('coName').value || 'Payroll').replace(/\s+/g, '_');
    link.download = `${zipPrefix}_Payslips_${m}_${y}.zip`;
    link.click();
    
    pb.classList.add('hidden'); 
    btn.disabled = false;
}

// ---> DYNAMIC EXCEL TEMPLATE GENERATOR <---
function downloadTemplate() {
    // Row 0 acts as the Master Category Header. Blank strings inherit the last category.
    const row0 = ['INFO', '', '', '', '', 'EARNINGS', '', '', '', 'DEDUCTIONS', '', ''];
    // Row 1 acts as the specific column name.
    const row1 = ['Name', 'ID', 'Designation', 'PaidDays', 'LOPDays', 'Basic Salary', 'HRA', 'Travel Allowance', 'Bonus', 'PF', 'Professional Tax', 'Income Tax'];
    
    const randomBasic = Math.floor(Math.random() * (80000 - 30000 + 1)) + 30000;
    const row2 = ['Example Employee', 'EMP-1234', 'Manager', 22, 1, randomBasic, Math.floor(randomBasic*0.4), 2000, 500, Math.floor(randomBasic*0.12), 200, 1500];
    
    const ws = XLSX.utils.aoa_to_sheet([row0, row1, row2]);
    
    // Add visual merges to the top row to make it clear for the user
    ws['!merges'] = [
        { s: {r:0, c:0}, e: {r:0, c:4} }, // INFO spans cols 0-4
        { s: {r:0, c:5}, e: {r:0, c:8} }, // EARNINGS spans cols 5-8
        { s: {r:0, c:9}, e: {r:0, c:11} } // DEDUCTIONS spans cols 9-11
    ];
    
    // Auto width adjustments
    ws['!cols'] = row1.map(h => ({ wch: Math.max(h.length + 5, 12) }));

    const wb = XLSX.utils.book_new(); 
    XLSX.utils.book_append_sheet(wb, ws, "Payroll");
    XLSX.writeFile(wb, "Dynamic_Staff_Template.xlsx");
}
